# Code task workflow: propose -> review plan -> implement -> review code -> merge
#
# Agents use cx for task specs and comments, ox-rt for signaling completion.
# Each step gets a cloned workspace on a feature branch named after the task.

[workflow]
name        = "code-task"
description = "Propose -> review plan -> implement -> review code -> merge"

# -- Propose ------------------------------------------------------------------

[[step]]
name      = "propose"
output    = "diff"
max_visits      = 3
max_visits_goto = "plan-tiebreak"

[step.workspace]
git_clone = true
branch    = "{task_id}"
push      = true

[step.runtime]
type    = "claude"
model   = "sonnet"
persona = "inspired/software-engineer"
prompt  = """Read the task spec and explore the codebase. Write a proposal.

1. Read the task spec: `cx show {task_id}`
2. Explore the codebase to understand the current state.
3. Write your implementation plan covering:
   - Which files/modules to change and why
   - Key design decisions
   - Test strategy
   - Documentation plan -- identify which docs (README, PRD, etc.) need
     updating if user-facing behavior or API surface changes
   - Risks or open questions
4. Post the proposal as a cx comment:
   `cx comment {task_id} --tag proposal --file /tmp/plan.md`
5. Commit, push, and report done:
   ```
   git add .complex/
   git commit -m "propose({task_id}): implementation plan"
   git push origin {task_id}
   ox-rt done proposed
   ```

Do NOT modify the issue body -- it is the spec. Write your proposal as
a comment. Do NOT write code yet.
"""

[[step.artifact]]
name = "proposal"

# -- Review Plan ---------------------------------------------------------------

[[step]]
name        = "review-plan"
output      = "verdict"
max_retries = 1

[step.workspace]
git_clone = true
branch    = "{task_id}"
push      = true

[step.runtime]
type    = "claude"
model   = "sonnet"
persona = "inspired/tech-lead"
prompt  = """Review the implementation plan proposed for this task.

1. Read the task spec: `cx show {task_id}`
2. Read the proposal: `cx comments {task_id} --tag proposal`
3. Score each criterion on a 3-point scale (0/1/2):

   - **Spec coverage** -- does the plan address all acceptance criteria?
   - **Scope discipline** -- no unnecessary changes, no over-engineering?
   - **Risk awareness** -- edge cases, failure modes, dependencies identified?
   - **Testability** -- concrete test strategy that verifies acceptance criteria?
   - **Documentation** -- does the plan identify which docs need updating?

   Scoring: 2 = meets expectations, 1 = marginal, 0 = does not meet.
   Total >= 7 AND no zeros -> pass. Any zero -> fail regardless of total.

4. Post your review as a cx comment:
   `cx comment {task_id} --tag review --file /tmp/review.md`

5. Commit, push, and report verdict:
   ```
   git add .complex/
   git commit -m "review-plan({task_id}): <PASS or FAIL>"
   git push origin {task_id}
   ```
   - `ox-rt done "pass:<score>"` if verdict is pass (score out of 10)
   - `ox-rt done "fail:<score>"` if verdict is fail
"""

[[step.transition]]
match = "pass"
goto  = "implement"

[[step.transition]]
match = "fail"
goto  = "propose"

[[step.transition]]
match = "*"
goto  = "escalate"

# -- Plan Tiebreak -------------------------------------------------------------

[[step]]
name          = "plan-tiebreak"
max_visits    = 2

[step.workspace]
git_clone = true
branch    = "{task_id}"
push      = true

[step.runtime]
type    = "claude"
model   = "sonnet"
persona = "inspired/tech-lead"
prompt  = """This task has failed plan review 3 times. You are the tiebreaker.

1. Read the task spec: `cx show {task_id}`
2. Read ALL proposals and reviews: `cx comments {task_id}`
3. Decide:
   - If feasible: write the definitive plan yourself, post as a comment:
     `cx comment {task_id} --tag proposal --file /tmp/plan.md`
     `git add .complex/ && git commit -m "tiebreak({task_id}): definitive plan"`
     `git push origin {task_id}`
     `ox-rt done pass`
   - If not feasible: shadow it.
     `cx shadow {task_id} --reason "not feasible after 3 review cycles"`
     `git add .complex/ && git commit -m "tiebreak({task_id}): not feasible"`
     `git push origin {task_id}`
     `ox-rt done fail`
"""

[[step.transition]]
match = "pass"
goto  = "implement"

[[step.transition]]
match = "fail"
goto  = "escalate"

[[step.transition]]
match = "*"
goto  = "escalate"

# -- Implement -----------------------------------------------------------------

[[step]]
name      = "implement"
output    = "diff"
max_visits      = 3
max_visits_goto = "code-tiebreak"

[step.workspace]
git_clone = true
branch    = "{task_id}"
push      = true

[step.runtime]
type    = "claude"
model   = "sonnet"
persona = "inspired/software-engineer"
prompt  = """Implement the task following the approved proposal.

1. Read the task spec: `cx show {task_id}`
2. Read the approved proposal: `cx comments {task_id} --tag proposal`
3. Read reviewer feedback: `cx comments {task_id} --tag review`
   Address any concerns flagged in the review — even on a pass, low
   scores or flagged gaps are things the code reviewer will check.
4. Rebase onto main and resolve any conflicts:
   ```
   git fetch origin main
   git rebase origin/main
   ```
   If the rebase has conflicts, resolve them:
   - Read the conflict markers in each file
   - Understand what main changed (another task likely merged)
   - Keep both changes where possible — your work AND main's changes
   - `git add <resolved files>` then `git rebase --continue`
   - Repeat for each conflicting commit until the rebase completes
   - If a conflict is unresolvable, `git rebase --abort` and report
     `ox-rt done fail` with a description of the conflict
5. Write code and tests as specified in the proposal.
6. Update documentation: if user-facing behavior or API surface changed,
   update the relevant docs (README, docs/, etc.) as identified in the
   proposal's documentation plan.
7. Verify: `cargo build`, `cargo test`, `cargo clippy` must pass.
8. Commit, push, and report done:
   ```
   git add <changed files>
   git commit -m "{task_id}: <description>"
   git push origin {task_id}
   ox-rt done <commit-sha>
   ```
"""

# -- Review Code ---------------------------------------------------------------

[[step]]
name        = "review-code"
output      = "verdict"
max_retries = 2

[step.workspace]
git_clone = true
branch    = "{task_id}"
push      = true

[step.runtime]
type    = "claude"
model   = "sonnet"
persona = "inspired/reviewer"
prompt  = """Review the implementation against the task spec and approved proposal.

1. Read the task spec: `cx show {task_id}`
2. Read the proposal: `cx comments {task_id} --tag proposal`
3. Review the diff: `git diff origin/main..HEAD`
4. Score each criterion on a 3-point scale (0/1/2):

   - **Correctness** -- does the code do what the spec says?
   - **Test coverage** -- are acceptance criteria verified by tests?
   - **Scope discipline** -- no unrelated changes, no gold-plating?
   - **Build health** -- compiles, tests pass, clippy clean?
   - **Documentation** -- are docs updated to reflect changed behavior?

   Scoring: 2 = meets expectations, 1 = marginal, 0 = does not meet.
   Total >= 7 AND no zeros -> pass. Any zero -> fail regardless of total.

5. Post your review as a cx comment:
   `cx comment {task_id} --tag code-review --file /tmp/review.md`

6. If PASS: integrate the task, squash all branch commits into one,
   then push:
   ```
   cx integrate {task_id} --reason "review passed"
   git add .complex/
   git commit -m "integrate({task_id}): review passed"
   git reset --soft origin/main
   git commit -m "{task_id}: <clear, complete commit message describing what was built and why>"
   git push --force-with-lease origin {task_id}
   ox-rt done "pass:<score>"
   ```

   If FAIL: commit the review and report fail:
   ```
   git add .complex/
   git commit -m "review-code({task_id}): FAIL"
   git push origin {task_id}
   ox-rt done "fail:<score>"
   ```
"""

[[step.transition]]
match = "pass"
goto  = "merge"

[[step.transition]]
match = "fail"
goto  = "implement"

[[step.transition]]
match = "*"
goto  = "escalate"

# -- Code Tiebreak -------------------------------------------------------------

[[step]]
name          = "code-tiebreak"
max_visits    = 2

[step.workspace]
git_clone = true
branch    = "{task_id}"
push      = true

[step.runtime]
type    = "claude"
model   = "sonnet"
persona = "inspired/tech-lead"
prompt  = """This task needs tiebreaking — either code review failed repeatedly or
the merge had conflicts. You are the tiebreaker.

1. Read the task spec: `cx show {task_id}`
2. Read ALL comments: `cx comments {task_id}`
3. Rebase onto main and resolve any conflicts:
   ```
   git fetch origin main
   git rebase origin/main
   ```
   If the rebase has conflicts, resolve them:
   - Read the conflict markers in each file
   - Understand what main changed (another task likely merged first)
   - Keep both changes — your branch's work AND main's new code
   - `git add <resolved files>` then `git rebase --continue`
   - Repeat until the rebase completes
4. Review the diff: `git diff origin/main..HEAD`
5. Verify the build: `cargo build && cargo test && cargo clippy`
6. Decide:
   - If the code works after rebase: integrate, squash, and report pass:
     `cx integrate {task_id} --reason "tiebreak: resolved and integrated"`
     `git add -A && git commit -m "tiebreak({task_id}): resolve and integrate"`
     `git reset --soft origin/main`
     `git commit -m "{task_id}: <clear, complete commit message describing what was built and why>"`
     `git push --force-with-lease origin {task_id}`
     `ox-rt done pass`
   - If fundamentally broken: shadow it.
     `cx shadow {task_id} --reason "implementation not salvageable"`
     `git add .complex/ && git commit -m "tiebreak({task_id}): not salvageable"`
     `git push --force-with-lease origin {task_id}`
     `ox-rt done fail`
"""

[[step.transition]]
match = "pass"
goto  = "merge"

[[step.transition]]
match = "fail"
goto  = "escalate"

[[step.transition]]
match = "*"
goto  = "escalate"

# -- Merge ---------------------------------------------------------------------

[[step]]
name        = "merge"
action      = "merge_to_main"
squash      = true
on_fail     = "code-tiebreak"
max_retries = 2

[step.workspace]
branch = "{task_id}"

# -- Triggers ------------------------------------------------------------------

[[trigger]]
on       = "cx.task_ready"
tag      = "workflow:code-task"
workflow = "code-task"
