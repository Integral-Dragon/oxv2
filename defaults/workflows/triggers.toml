# Triggers map source events (from watcher plugins) onto workflow
# executions. Each trigger declares:
#   - `on`: the source-native event kind it matches (e.g. `node.ready`)
#   - `source`: the watcher namespace it filters on (e.g. `cx`)
#   - `[trigger.where]`: optional predicates over event fields
#   - `workflow`: the workflow to run
#   - `[trigger.vars]`: how to populate the workflow's declared vars
#     from event fields. Templates may reference `{event.source}`,
#     `{event.kind}`, `{event.subject_id}`, or `{event.data.<path>}`
#     for dotted walks into the source payload.
#
# ox-cx-watcher emits source events with `source = "cx"` and kinds
# `node.ready` / `node.claimed` / `node.done` / `comment.added`.

[[trigger]]
on       = "node.ready"
source   = "cx"
workflow = "code-task"
[trigger.where]
"data.tags" = { contains = "workflow:code-task" }
[trigger.vars]
task_id = "{event.subject_id}"

[[trigger]]
on       = "node.ready"
source   = "cx"
workflow = "consultation"
[trigger.where]
"data.tags" = { contains = "workflow:consultation" }
[trigger.vars]
branch = "{event.subject_id}"

[[trigger]]
on       = "node.done"
source   = "cx"
workflow = "cx-surface"
[trigger.where]
"data.tags" = { contains = "workflow:code-task" }
[trigger.vars]
completed_task_id = "{event.subject_id}"
branch = "cx-surface-{event.subject_id}"
