# Default ox configuration.
# Trigger files are resolved relative to this file's parent directory.

triggers = [
    "workflows/triggers.toml",
]

# Watchers run as sibling processes alongside ox-server. Each entry
# resolves to an `ox-<name>-watcher` binary. `cx` is the reference
# event source for local development; remove it (and install the
# relevant watcher) for projects driven by Linear, GitHub, etc.
watchers = ["cx"]

heartbeat_grace = 60
