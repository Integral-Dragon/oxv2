# OpenAI Codex runtime.
#
# Codex authenticates via ~/.codex/auth.json (OAuth / ChatGPT login).
# The auth JSON is injected via the `codex_auth` secret.
#
#   codex login                                     # on the host, once
#   ox-ctl secrets set codex_auth --value "$(cat ~/.codex/auth.json)"
#
# `ox-ctl up` seeds this automatically from ~/.codex/auth.json if present.

[runtime]
name = "codex"

[runtime.vars]
model  = { type = "string" }
prompt = { type = "string", default = "" }

[runtime.command]
# codex exec is the headless subcommand — the bare `codex <prompt>` form
# launches the interactive TUI, which refuses to run without a stdin TTY
# ("Error: stdin is not a terminal"). Flag rationale:
#   --full-auto:  reduces approval prompts, grants workspace write (analogous
#                 to claude's --dangerously-skip-permissions). Review steps
#                 need write access for git commit / cx comment.
#   --json:       newline-delimited JSON event stream, mirrors claude's
#                 stream-json output for consistent log capture.
#   --color never: no ANSI escapes in captured step logs.
cmd = [
    "codex", "exec",
    "--full-auto",
    "--json",
    "--color", "never",
    "{tmp_dir}/ox-prompt",
]
interactive_cmd = ["codex"]

[[runtime.command.optional]]
when = "model"
args = ["--model", "{var.model}"]

# Assemble persona instructions + prompt into a single prompt file.
[[runtime.files]]
content = "{persona.instructions}\n\n---\n\n{var.prompt}"
to      = "{tmp_dir}/ox-prompt"

# Place persona instructions as system prompt for codex
[[runtime.files]]
content = "{persona.instructions}"
to      = "{workspace}/.codex/system-prompt.md"

# Inject OAuth credentials from secrets into the runner's home directory.
[[runtime.files]]
content = "{secret.codex_auth}"
to      = "{home}/.codex/auth.json"

[[runtime.proxy]]
env      = "OPENAI_BASE_URL"
provider = "openai"
target   = "https://api.openai.com"

[[runtime.metrics]]
name   = "input_tokens"
type   = "counter"
source = "proxy"

[[runtime.metrics]]
name   = "output_tokens"
type   = "counter"
source = "proxy"

[[runtime.metrics]]
name   = "api_calls"
type   = "counter"
source = "proxy"

[[runtime.metrics]]
name   = "response_latency_ms"
type   = "histogram"
source = "proxy"
