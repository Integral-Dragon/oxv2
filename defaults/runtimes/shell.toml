# Shell runtime — runs a bash command.
# Useful for scripted steps, build steps, and testing.
#
# One-shot: runs bash -c with the prompt as the command.
# Interactive (tty = true): opens a bash session.
#
#   [step.runtime]
#   type = "shell"
#   prompt = "echo hello && ox-rt done pass"

[runtime]
name = "shell"

[runtime.vars]
prompt = { type = "string", default = "echo 'no command'; exit 1" }

[runtime.command]
cmd = ["bash", "-c", "{var.prompt}"]
interactive_cmd = ["bash"]
