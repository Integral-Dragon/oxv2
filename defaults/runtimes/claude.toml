# Claude Code runtime.
#
# One-shot mode (default): runs claude -p with the assembled prompt file.
# Interactive mode (tty = true): runs claude in interactive session.
#
# Claude Code authenticates via ~/.claude/.credentials.json (OAuth).
# The credentials JSON is injected via the `claude_credentials` secret.
#
#   ox-ctl secrets set claude_credentials --value "$(cat ~/.claude/.credentials.json)"
#
# The step spec selects the mode:
#   [step.runtime]
#   type = "claude"
#   model = "sonnet"
#   persona = "inspired/software-engineer"
#   prompt = "Implement the feature."
#
# For interactive steps:
#   [step.runtime]
#   type = "claude"
#   tty = true

[runtime]
name = "claude"

[runtime.vars]
model  = { type = "string" }
prompt = { type = "string", default = "" }

[runtime.command]
cmd = [
    "claude",
    "-p", "{tmp_dir}/ox-prompt",
    "--dangerously-skip-permissions",
    "--verbose",
    "--output-format", "stream-json",
]
interactive_cmd = ["claude"]

[[runtime.command.optional]]
when = "model"
args = ["--model", "{var.model}"]

# Assemble persona + prompt into a single prompt file.
[[runtime.files]]
content = "{workflow.persona}\n\n---\n\n{var.prompt}"
to      = "{tmp_dir}/ox-prompt"

# Inject OAuth credentials from secrets into the runner's home directory.
# The runner resolves {home} to the process HOME before placing files.
[[runtime.files]]
content = "{secret.claude_credentials}"
to      = "{home}/.claude/.credentials.json"
